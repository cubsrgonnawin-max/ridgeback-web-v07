<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ridgeback Global Infrastructure — Autonomous mission governance OS for defense, regulated infrastructure inspection, and autonomous systems. Built for the DoD and critical industry.">
  <title>Ridgeback Global Infrastructure LLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════════ */
    :root {
      --slate:   #080f1c;
      --slate2:  #0d1628;
      --slate3:  #121e34;
      --slate4:  #1a2845;
      --gold:    #C8973A;
      --gold2:   #E4B96A;
      --gold3:   #7a5820;
      --gold4:   #f5d48a;
      --silver:  #8fa3b8;
      --silver2: #b8ccd8;
      --fog:     #4a5e72;
      --fog2:    #354555;
      --white:   #eef2f7;
      --red:     #c0392b;
      --green:   #27ae60;
      --accent:  #1e3a5f;

      --font-display: 'Cinzel', Georgia, serif;
      --font-body:    'Crimson Pro', Georgia, serif;
      --font-mono:    'JetBrains Mono', 'Courier New', monospace;

      --easing: cubic-bezier(0.16, 1, 0.3, 1);
      --transition: 0.35s var(--easing);
    }

    /* ═══════════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════════ */
    *, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      background: var(--slate);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ═══════════════════════════════════════════════════
       AMBIENT TEXTURE
    ═══════════════════════════════════════════════════ */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Grid overlay — very subtle */
    .grid-overlay {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(200,151,58,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,151,58,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════════════
       NAVIGATION
    ═══════════════════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 1.1rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(200,151,58,0.1);
      background: rgba(8,15,28,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .nav-brand {
      display: flex; align-items: center; gap: 1rem;
    }

    .nav-brand-mark {
      width: 32px; height: 32px;
      border: 1px solid rgba(200,151,58,0.5);
      display: flex; align-items: center; justify-content: center;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .nav-brand-mark-inner {
      width: 10px; height: 10px;
      background: var(--gold);
      transform: rotate(0deg);
    }

    .nav-brand-text {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .nav-center {
      display: flex; align-items: center; gap: 2.5rem;
    }

    .nav-link {
      font-family: var(--font-mono);
      font-size: 0.64rem;
      letter-spacing: 0.15em;
      color: var(--fog);
      text-transform: uppercase;
      transition: color var(--transition);
      cursor: pointer;
    }

    .nav-link:hover { color: var(--gold2); }

    .nav-right {
      display: flex; align-items: center; gap: 1.5rem;
    }

    .nav-status {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: var(--fog);
      text-transform: uppercase;
      border: 1px solid rgba(200,151,58,0.12);
      padding: 0.4rem 0.9rem;
    }

    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse-dot 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.65); }
    }

    .nav-cta {
      font-family: var(--font-display);
      font-size: 0.64rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--slate);
      background: var(--gold);
      border: none;
      padding: 0.55rem 1.4rem;
      cursor: pointer;
      transition: background var(--transition);
    }

    .nav-cta:hover { background: var(--gold2); }

    /* ═══════════════════════════════════════════════════
       CLASSIFICATION BANNER
    ═══════════════════════════════════════════════════ */
    .class-banner {
      position: relative; z-index: 1;
      margin-top: 64px; /* nav height */
      background: rgba(200,151,58,0.06);
      border-bottom: 1px solid rgba(200,151,58,0.15);
      padding: 0.55rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
    }

    .class-text {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--gold3);
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════════════ */
    .hero {
      position: relative; z-index: 1;
      min-height: calc(100vh - 96px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 5rem 2rem 3rem;
      overflow: hidden;
    }

    /* Radial glow */
    .hero-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -58%);
      width: 720px; height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,151,58,0.055) 0%, transparent 65%);
      pointer-events: none;
      animation: glow-breathe 5s ease-in-out infinite;
    }

    @keyframes glow-breathe {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -58%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -58%) scale(1.1); }
    }

    /* Scanning line */
    .hero-scan {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.3;
      animation: scan-line 8s linear infinite;
      pointer-events: none;
    }

    @keyframes scan-line {
      0%   { top: 0%; opacity: 0; }
      5%   { opacity: 0.3; }
      95%  { opacity: 0.15; }
      100% { top: 100%; opacity: 0; }
    }

    .hero-content {
      position: relative; z-index: 2;
      max-width: 900px;
      animation: fade-up 1.2s var(--easing) forwards;
      opacity: 0;
    }

    @keyframes fade-up {
      0%   { opacity: 0; transform: translateY(28px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-wrap {
      width: 340px; height: auto;
      margin: 0 auto 2.5rem;
    }

    .logo-wrap img {
      width: 100%; height: auto;
      object-fit: contain;
      filter:
        drop-shadow(0 0 36px rgba(200,151,58,0.3))
        drop-shadow(0 0 72px rgba(200,151,58,0.1));
      animation: logo-in 1.5s var(--easing) forwards;
      opacity: 0;
    }

    @keyframes logo-in {
      0%   { opacity: 0; transform: scale(0.88); }
      60%  { opacity: 1; transform: scale(1.02); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Eyebrow above company name */
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--gold3);
      text-transform: uppercase;
      margin-bottom: 1rem;
      animation: fade-up 1s var(--easing) 0.15s forwards;
      opacity: 0;
    }

    .hero-company {
      font-family: var(--font-display);
      font-size: clamp(1.7rem, 4.5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 0.6rem;
      animation: fade-up 1s var(--easing) 0.25s forwards;
      opacity: 0;
    }

    .hero-rule {
      width: 64px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.8rem;
      animation: rule-in 1s var(--easing) 0.4s forwards;
      opacity: 0;
    }

    @keyframes rule-in {
      0%   { opacity: 0; width: 0; }
      100% { opacity: 1; width: 64px; }
    }

    .hero-tagline {
      font-family: var(--font-body);
      font-size: clamp(1.1rem, 2.2vw, 1.45rem);
      font-style: italic;
      color: var(--gold2);
      letter-spacing: 0.03em;
      margin-bottom: 1rem;
      animation: fade-up 1s var(--easing) 0.5s forwards;
      opacity: 0;
    }

    .hero-sub {
      font-family: var(--font-body);
      font-size: 1.05rem;
      color: var(--silver);
      line-height: 1.75;
      max-width: 640px;
      margin: 0 auto 3rem;
      animation: fade-up 1s var(--easing) 0.65s forwards;
      opacity: 0;
    }

    /* Program badges */
    .hero-badges {
      display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap;
      margin-bottom: 3rem;
      animation: fade-up 1s var(--easing) 0.8s forwards;
      opacity: 0;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 0.6rem;
      border: 1px solid rgba(200,151,58,0.25);
      background: rgba(200,151,58,0.04);
      padding: 0.55rem 1.25rem;
    }

    .badge-dot {
      width: 4px; height: 4px;
      background: var(--gold);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-text {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* Pillars */
    .pillars {
      display: flex; gap: 1px; justify-content: center;
      margin-bottom: 3.5rem;
      animation: fade-up 1s var(--easing) 0.95s forwards;
      opacity: 0;
    }

    .pillar {
      padding: 1.2rem 1.8rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(200,151,58,0.09);
      flex: 1 1 0; max-width: 210px;
      text-align: center;
      transition: background var(--transition), border-color var(--transition);
    }

    .pillar:hover {
      background: rgba(200,151,58,0.04);
      border-color: rgba(200,151,58,0.22);
    }

    .pillar-icon { font-size: 1.4rem; margin-bottom: 0.55rem; display: block; }

    .pillar-label {
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.4rem;
    }

    .pillar-desc {
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--silver);
      font-style: italic;
      line-height: 1.4;
    }

    /* CTA row */
    .hero-cta {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      animation: fade-up 1s var(--easing) 1.1s forwards;
      opacity: 0;
    }

    .btn-primary {
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--slate);
      background: var(--gold);
      border: none;
      padding: 0.85rem 2.2rem;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      display: inline-block;
    }

    .btn-primary:hover { background: var(--gold2); transform: translateY(-2px); }

    .btn-ghost {
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      background: transparent;
      border: 1px solid rgba(200,151,58,0.35);
      padding: 0.85rem 2.2rem;
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition), transform var(--transition);
      display: inline-block;
    }

    .btn-ghost:hover {
      border-color: var(--gold);
      color: var(--gold2);
      transform: translateY(-2px);
    }

    /* Scroll cue */
    .scroll-hint {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      animation: fade-up 1s var(--easing) 1.6s forwards;
      opacity: 0;
    }

    .scroll-hint span {
      font-family: var(--font-mono);
      font-size: 0.54rem;
      letter-spacing: 0.22em;
      color: var(--fog);
      text-transform: uppercase;
    }

    .scroll-line {
      width: 1px; height: 38px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scroll-drop 2s ease-in-out infinite;
    }

    @keyframes scroll-drop {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 0; }
      50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
    }

    /* Mountain silhouette */
    .hero-mountains {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 0; pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════
       SECTION DIVIDERS
    ═══════════════════════════════════════════════════ */
    .section-divider {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 1.5rem;
      padding: 0 3rem; margin: 0 auto;
      max-width: 1140px;
    }

    .section-divider::before,
    .section-divider::after {
      content: ""; flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,151,58,0.18), transparent);
    }

    .divider-mark {
      font-family: var(--font-display);
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      color: var(--gold3);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .divider-mark-num {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      color: var(--fog2);
      margin-right: 0.75rem;
    }

    /* ═══════════════════════════════════════════════════
       SHARED SECTION ELEMENTS
    ═══════════════════════════════════════════════════ */
    .section-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.75rem;
    }

    .section-eyebrow::before {
      content: "";
      display: inline-block;
      width: 22px; height: 1px;
      background: var(--gold);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.35rem, 3vw, 2.1rem);
      font-weight: 600;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 1.4rem;
    }

    .section-body {
      font-family: var(--font-body);
      font-size: 1.08rem;
      color: var(--silver);
      line-height: 1.82;
      margin-bottom: 1.1rem;
    }

    /* ═══════════════════════════════════════════════════
       ABOUT
    ═══════════════════════════════════════════════════ */
    .about {
      position: relative; z-index: 1;
      padding: 5.5rem 2rem;
      max-width: 1140px; margin: 0 auto;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }

    .cap-list {
      list-style: none;
      display: flex; flex-direction: column; gap: 0.8rem;
      margin-top: 1.5rem;
    }

    .cap-list li {
      display: flex; align-items: flex-start; gap: 0.85rem;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--silver);
      line-height: 1.5;
    }

    .cap-list li::before {
      content: "◆";
      color: var(--gold);
      font-size: 0.52rem;
      margin-top: 0.45rem;
      flex-shrink: 0;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      margin-top: 2.5rem;
    }

    .stat-card {
      background: rgba(255,255,255,0.018);
      border: 1px solid rgba(200,151,58,0.1);
      padding: 1.5rem;
      text-align: center;
      transition: background var(--transition);
    }

    .stat-card:hover { background: rgba(200,151,58,0.04); }

    .stat-num {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      display: block;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: var(--fog);
      text-transform: uppercase;
    }

    /* SBIR / Patent callout box */
    .credentials-box {
      background: rgba(200,151,58,0.04);
      border: 1px solid rgba(200,151,58,0.2);
      border-left: 3px solid var(--gold);
      padding: 1.5rem 1.75rem;
      margin-top: 2rem;
    }

    .credentials-title {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }

    .credentials-item {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--silver);
      line-height: 1.6;
      display: flex; gap: 0.75rem; align-items: baseline;
      margin-bottom: 0.4rem;
    }

    .credentials-item:last-child { margin-bottom: 0; }

    .cred-key {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--fog);
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════
       PLATFORM LAYERS
    ═══════════════════════════════════════════════════ */
    .platform {
      position: relative; z-index: 1;
      padding: 5.5rem 2rem;
      background: rgba(255,255,255,0.013);
      border-top: 1px solid rgba(200,151,58,0.07);
      border-bottom: 1px solid rgba(200,151,58,0.07);
    }

    .platform-inner { max-width: 1140px; margin: 0 auto; }

    .platform-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    /* OS architecture diagram */
    .os-stack {
      display: flex; flex-direction: column; gap: 2px;
      margin-bottom: 3rem;
    }

    .os-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 2px;
    }

    .os-tier-label {
      background: rgba(200,151,58,0.06);
      border: 1px solid rgba(200,151,58,0.12);
      display: flex; align-items: center; justify-content: center;
      padding: 0.5rem;
      writing-mode: horizontal-tb;
      position: relative;
    }

    .os-tier-text {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.14em;
      color: var(--gold3);
      text-transform: uppercase;
      text-align: center;
      line-height: 1.4;
    }

    .os-cells {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .os-cell {
      background: rgba(8,15,28,0.7);
      border: 1px solid rgba(200,151,58,0.07);
      padding: 1.1rem 1rem;
      transition: border-color var(--transition), background var(--transition);
      position: relative;
      overflow: hidden;
    }

    .os-cell::before {
      content: "";
      position: absolute; top: 0; left: 0;
      width: 2px; height: 0;
      background: var(--gold);
      transition: height 0.5s var(--easing);
    }

    .os-cell:hover {
      border-color: rgba(200,151,58,0.22);
      background: rgba(200,151,58,0.028);
    }

    .os-cell:hover::before { height: 100%; }

    .os-layer-id {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      color: var(--gold3);
      display: block;
      margin-bottom: 0.35rem;
    }

    .os-layer-name {
      font-family: var(--font-display);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--white);
      display: block;
      margin-bottom: 0.35rem;
    }

    .os-layer-desc {
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--fog);
      font-style: italic;
      line-height: 1.45;
    }

    /* Layer grid (original layout for smaller screens) */
    .layer-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
    }

    .layer-card {
      background: rgba(8,15,28,0.65);
      border: 1px solid rgba(200,151,58,0.07);
      padding: 1.6rem 1.4rem;
      transition: border-color var(--transition), background var(--transition);
      position: relative;
      overflow: hidden;
    }

    .layer-card::before {
      content: "";
      position: absolute; top: 0; left: 0;
      width: 2px; height: 0;
      background: var(--gold);
      transition: height 0.45s var(--easing);
    }

    .layer-card:hover {
      border-color: rgba(200,151,58,0.22);
      background: rgba(200,151,58,0.028);
    }

    .layer-card:hover::before { height: 100%; }

    .layer-num {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: var(--gold3);
      display: block;
      margin-bottom: 0.45rem;
    }

    .layer-name {
      font-family: var(--font-display);
      font-size: 0.78rem;
      letter-spacing: 0.09em;
      color: var(--white);
      display: block;
      margin-bottom: 0.4rem;
    }

    .layer-desc {
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--fog);
      font-style: italic;
      line-height: 1.5;
    }

    /* ═══════════════════════════════════════════════════
       USE CASES
    ═══════════════════════════════════════════════════ */
    .use-cases {
      position: relative; z-index: 1;
      padding: 5.5rem 2rem;
      max-width: 1140px; margin: 0 auto;
    }

    .uc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin-top: 3rem;
    }

    .uc-card {
      background: rgba(255,255,255,0.016);
      border: 1px solid rgba(200,151,58,0.08);
      padding: 2rem 1.5rem;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition), background var(--transition);
    }

    .uc-card:hover {
      border-color: rgba(200,151,58,0.2);
      background: rgba(200,151,58,0.03);
    }

    /* Corner decoration */
    .uc-card::before, .uc-card::after {
      content: "";
      position: absolute;
      width: 10px; height: 10px;
      border-color: rgba(200,151,58,0.3);
      border-style: solid;
    }

    .uc-card::before { top: 0; left: 0; border-width: 1px 0 0 1px; }
    .uc-card::after  { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

    .uc-sector {
      font-family: var(--font-mono);
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      color: var(--gold3);
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.75rem;
    }

    .uc-title {
      font-family: var(--font-display);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      color: var(--white);
      display: block;
      margin-bottom: 0.75rem;
    }

    .uc-desc {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--silver);
      line-height: 1.65;
      margin-bottom: 1.1rem;
    }

    .uc-tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }

    .uc-tag {
      font-family: var(--font-mono);
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--fog);
      border: 1px solid rgba(200,151,58,0.12);
      padding: 0.2rem 0.6rem;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════════════════
       TECH STACK
    ═══════════════════════════════════════════════════ */
    .tech-section {
      position: relative; z-index: 1;
      padding: 5.5rem 2rem;
      background: rgba(255,255,255,0.012);
      border-top: 1px solid rgba(200,151,58,0.07);
      border-bottom: 1px solid rgba(200,151,58,0.07);
    }

    .tech-inner {
      max-width: 1140px; margin: 0 auto;
    }

    .tech-header {
      text-align: center; margin-bottom: 3.5rem;
    }

    .tech-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      margin-bottom: 3rem;
    }

    .tech-col {
      background: rgba(8,15,28,0.5);
      border: 1px solid rgba(200,151,58,0.07);
      padding: 1.5rem 1.25rem;
    }

    .tech-col-title {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(200,151,58,0.1);
    }

    .tech-item {
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--silver);
      line-height: 1.6;
      display: flex; align-items: baseline; gap: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .tech-item::before {
      content: "·";
      color: var(--gold3);
      font-size: 1.2rem;
      line-height: 0;
      flex-shrink: 0;
    }

    /* Security posture strip */
    .security-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
    }

    .sec-cell {
      background: rgba(200,151,58,0.03);
      border: 1px solid rgba(200,151,58,0.1);
      padding: 1.25rem;
      text-align: center;
    }

    .sec-icon {
      font-size: 1.3rem;
      display: block;
      margin-bottom: 0.6rem;
    }

    .sec-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.35rem;
    }

    .sec-desc {
      font-family: var(--font-body);
      font-size: 0.84rem;
      color: var(--fog);
      font-style: italic;
      line-height: 1.4;
    }

    /* ═══════════════════════════════════════════════════
       CONTACT
    ═══════════════════════════════════════════════════ */
    .contact {
      position: relative; z-index: 1;
      padding: 5.5rem 2rem;
      max-width: 1140px; margin: 0 auto;
      text-align: center;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin-top: 3.5rem;
    }

    .contact-card {
      border: 1px solid rgba(200,151,58,0.1);
      padding: 2.25rem 1.5rem;
      position: relative;
      transition: border-color var(--transition), background var(--transition);
    }

    .contact-card:hover {
      border-color: rgba(200,151,58,0.25);
      background: rgba(200,151,58,0.04);
    }

    /* Corner ticks */
    .corner-mark {
      position: absolute;
      width: 9px; height: 9px;
      border-color: rgba(200,151,58,0.3);
      border-style: solid;
    }

    .corner-tl { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .corner-tr { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    .contact-icon { font-size: 1.5rem; margin-bottom: 0.75rem; display: block; }

    .contact-label {
      font-family: var(--font-display);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.5rem;
    }

    .contact-value {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--silver);
      line-height: 1.65;
      display: block;
      transition: color var(--transition);
    }

    a.contact-value:hover { color: var(--gold2); }

    /* ═══════════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════════ */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid rgba(200,151,58,0.1);
      padding: 2rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }

    .footer-left {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--fog);
      text-transform: uppercase;
    }

    .footer-center {
      display: flex; gap: 2rem; align-items: center;
    }

    .footer-link {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: var(--fog2);
      text-transform: uppercase;
      transition: color var(--transition);
    }

    .footer-link:hover { color: var(--gold); }

    .footer-right {
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-style: italic;
      color: var(--fog);
    }

    /* ═══════════════════════════════════════════════════
       SCROLL REVEAL UTILITY
    ═══════════════════════════════════════════════════ */
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.75s var(--easing), transform 0.75s var(--easing);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* ═══════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════ */
    @media (max-width: 1000px) {
      .nav-center { display: none; }
      .about-grid { grid-template-columns: 1fr; gap: 3rem; }
      .tech-grid { grid-template-columns: repeat(2, 1fr); }
      .security-strip { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .hero { padding: 4rem 1.5rem 3rem; }
      .pillars { flex-wrap: wrap; }
      .pillar { max-width: 180px; }
      .os-cells { grid-template-columns: 1fr 1fr; }
      .layer-grid { grid-template-columns: 1fr 1fr; }
      .uc-grid { grid-template-columns: 1fr; }
      .tech-grid { grid-template-columns: 1fr 1fr; }
      .contact-grid { grid-template-columns: 1fr; }
      .class-banner { padding: 0.45rem 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
      footer { padding: 1.5rem; flex-direction: column; text-align: center; }
      .footer-center { justify-content: center; }
    }

    @media (max-width: 480px) {
      .logo-wrap { width: 240px; }
      .pillars { gap: 0.5rem; }
      .pillar { max-width: 100%; flex: 1 1 100%; }
      .layer-grid { grid-template-columns: 1fr; }
      .tech-grid { grid-template-columns: 1fr; }
      .security-strip { grid-template-columns: 1fr 1fr; }
      .os-cells { grid-template-columns: 1fr; }
      .os-row { grid-template-columns: 60px 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, ::before, ::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

